<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg4)"/>
  <!-- Ground -->
  <rect x="0" y="270" width="600" height="90" fill="#8D6E63" opacity="0.12"/>
  <!-- Heavy duty pump body -->
  <rect x="220" y="90" width="120" height="170" rx="14" fill="#0A1F3F"/>
  <!-- Top section -->
  <rect x="238" y="105" width="84" height="38" rx="6" fill="#00AEEF"/>
  <!-- Orange power band -->
  <rect x="238" y="155" width="84" height="18" rx="4" fill="#FF8C00"/>
  <!-- Display -->
  <rect x="245" y="185" width="70" height="48" rx="6" fill="#122D54"/>
  <text x="280" y="208" text-anchor="middle" font-family="monospace" font-size="11" fill="#F5A623">HIGH CAPACITY</text>
  <text x="280" y="225" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#4CAF50">1300W</text>
  <!-- Heavy pipes -->
  <rect x="270" y="40" width="20" height="60" fill="#0A1F3F"/>
  <rect x="262" y="32" width="36" height="14" rx="4" fill="#0A1F3F"/>
  <rect x="270" y="260" width="20" height="50" fill="#0A1F3F"/>
  <!-- Borehole -->
  <rect x="155" y="120" width="35" height="190" fill="#5D4037" opacity="0.15" rx="5"/>
  <rect x="160" y="120" width="18" height="190" fill="#00AEEF" opacity="0.08"/>
  <!-- Connector pipes -->
  <rect x="185" y="170" width="40" height="12" fill="#0A1F3F"/>
  <!-- Water tank (elevated) -->
  <rect x="60" y="80" width="70" height="60" rx="8" fill="#0A1F3F" opacity="0.7"/>
  <rect x="68" y="88" width="54" height="44" rx="4" fill="#00AEEF" opacity="0.3"/>
  <!-- Tank stand -->
  <rect x="75" y="140" width="8" height="130" fill="#0A1F3F" opacity="0.5"/>
  <rect x="112" y="140" width="8" height="130" fill="#0A1F3F" opacity="0.5"/>
  <!-- Pipe from pump to tank -->
  <path d="M270 50 Q270 35 200 35 Q95 35 95 80" stroke="#0A1F3F" stroke-width="6" fill="none"/>
  <!-- Water flow dots -->
  <circle cx="240" cy="37" r="3" fill="#00AEEF" opacity="0.6"/>
  <circle cx="200" cy="35" r="3" fill="#00AEEF" opacity="0.5"/>
  <circle cx="160" cy="38" r="3" fill="#00AEEF" opacity="0.4"/>
  <!-- Sun -->
  <circle cx="500" cy="65" r="42" fill="#F5A623" opacity="0.5"/>
  <!-- 4 Solar panels (large array) -->
  <rect x="390" y="135" width="42" height="70" rx="3" fill="#0A1F3F" transform="rotate(-10 411 170)"/>
  <rect x="436" y="135" width="42" height="70" rx="3" fill="#0A1F3F" transform="rotate(-10 457 170)"/>
  <rect x="482" y="135" width="42" height="70" rx="3" fill="#0A1F3F" transform="rotate(-10 503 170)"/>
  <rect x="528" y="135" width="42" height="70" rx="3" fill="#0A1F3F" transform="rotate(-10 549 170)"/>
  <!-- Cable -->
  <path d="M340 210 Q380 210 405 190" stroke="#FF8C00" stroke-width="2.5" fill="none" stroke-dasharray="5 3"/>
  <!-- POPULAR badge -->
  <rect x="220" y="75" width="120" height="22" rx="11" fill="#FF8C00"/>
  <text x="280" y="90" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="10" font-weight="800" fill="white" letter-spacing="1">BEST VALUE</text>
  <!-- Text -->
  <text x="300" y="335" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="18" font-weight="700" fill="#0A1F3F">1300W Solar Pump</text>
</svg>
