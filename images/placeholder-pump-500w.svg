<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8ED"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg2)"/>
  <!-- Water drops -->
  <path d="M180 90 C180 90 155 130 155 150 C155 164 166 175 180 175 C194 175 205 164 205 150 C205 130 180 90 180 90Z" fill="#00AEEF" opacity="0.25"/>
  <path d="M220 110 C220 110 205 135 205 147 C205 155 211 162 220 162 C229 162 235 155 235 147 C235 135 220 110 220 110Z" fill="#00AEEF" opacity="0.2"/>
  <!-- Pump body (larger) -->
  <rect x="255" y="130" width="90" height="130" rx="10" fill="#0A1F3F"/>
  <rect x="268" y="145" width="64" height="28" rx="5" fill="#00AEEF"/>
  <rect x="268" y="183" width="64" height="12" rx="3" fill="#FF8C00"/>
  <!-- Controller display -->
  <rect x="275" y="210" width="50" height="30" rx="4" fill="#122D54"/>
  <text x="300" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#4CAF50">500W</text>
  <!-- Pipe top -->
  <rect x="292" y="80" width="16" height="60" fill="#0A1F3F"/>
  <rect x="285" y="75" width="30" height="10" rx="3" fill="#0A1F3F"/>
  <!-- Pipe bottom -->
  <rect x="292" y="260" width="16" height="40" fill="#0A1F3F"/>
  <!-- Sun with rays -->
  <circle cx="470" cy="75" r="40" fill="#F5A623" opacity="0.5"/>
  <g stroke="#F5A623" stroke-width="3" opacity="0.5">
    <line x1="470" y1="20" x2="470" y2="30"/>
    <line x1="470" y1="120" x2="470" y2="130"/>
    <line x1="415" y1="75" x2="425" y2="75"/>
    <line x1="515" y1="75" x2="525" y2="75"/>
    <line x1="431" y1="36" x2="438" y2="43"/>
    <line x1="502" y1="107" x2="509" y2="114"/>
    <line x1="431" y1="114" x2="438" y2="107"/>
    <line x1="502" y1="43" x2="509" y2="36"/>
  </g>
  <!-- Solar panels (2 panels) -->
  <rect x="410" y="150" width="55" height="80" rx="3" fill="#0A1F3F" transform="rotate(-10 437 190)"/>
  <rect x="475" y="150" width="55" height="80" rx="3" fill="#0A1F3F" transform="rotate(-10 502 190)"/>
  <g stroke="#00AEEF" stroke-width="0.8" opacity="0.6">
    <line x1="425" y1="152" x2="425" y2="228" transform="rotate(-10 437 190)"/>
    <line x1="440" y1="152" x2="440" y2="228" transform="rotate(-10 437 190)"/>
    <line x1="455" y1="152" x2="455" y2="228" transform="rotate(-10 437 190)"/>
    <line x1="490" y1="152" x2="490" y2="228" transform="rotate(-10 502 190)"/>
    <line x1="505" y1="152" x2="505" y2="228" transform="rotate(-10 502 190)"/>
    <line x1="520" y1="152" x2="520" y2="228" transform="rotate(-10 502 190)"/>
  </g>
  <!-- Text -->
  <text x="300" y="330" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="18" font-weight="700" fill="#0A1F3F">500W Solar Pump</text>
</svg>
