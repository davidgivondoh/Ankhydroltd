<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8ED"/>
      <stop offset="100%" style="stop-color:#FFECD2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg5)"/>
  <!-- House outline -->
  <path d="M300 60 L420 140 L420 280 L180 280 L180 140Z" fill="#0A1F3F" opacity="0.08"/>
  <path d="M300 60 L420 140 L180 140Z" fill="#0A1F3F" opacity="0.12"/>
  <!-- Solar panels on roof -->
  <rect x="210" y="85" width="75" height="45" rx="3" fill="#0A1F3F" transform="rotate(-25 247 107)"/>
  <rect x="295" y="85" width="75" height="45" rx="3" fill="#0A1F3F" transform="rotate(25 332 107)"/>
  <g stroke="#00AEEF" stroke-width="0.8" opacity="0.5">
    <line x1="230" y1="87" x2="230" y2="128" transform="rotate(-25 247 107)"/>
    <line x1="250" y1="87" x2="250" y2="128" transform="rotate(-25 247 107)"/>
    <line x1="270" y1="87" x2="270" y2="128" transform="rotate(-25 247 107)"/>
    <line x1="315" y1="87" x2="315" y2="128" transform="rotate(25 332 107)"/>
    <line x1="335" y1="87" x2="335" y2="128" transform="rotate(25 332 107)"/>
    <line x1="355" y1="87" x2="355" y2="128" transform="rotate(25 332 107)"/>
  </g>
  <!-- Sun -->
  <circle cx="500" cy="60" r="35" fill="#F5A623" opacity="0.6"/>
  <g stroke="#F5A623" stroke-width="2.5" opacity="0.5">
    <line x1="500" y1="12" x2="500" y2="22"/>
    <line x1="500" y1="98" x2="500" y2="108"/>
    <line x1="452" y1="60" x2="462" y2="60"/>
    <line x1="538" y1="60" x2="548" y2="60"/>
    <line x1="466" y1="26" x2="472" y2="32"/>
    <line x1="528" y1="88" x2="534" y2="94"/>
    <line x1="466" y1="94" x2="472" y2="88"/>
    <line x1="528" y1="32" x2="534" y2="26"/>
  </g>
  <!-- Battery -->
  <rect x="80" y="160" width="70" height="100" rx="10" fill="#0A1F3F"/>
  <rect x="100" y="152" width="30" height="12" rx="4" fill="#0A1F3F"/>
  <rect x="90" y="175" width="50" height="15" rx="3" fill="#4CAF50"/>
  <rect x="90" y="195" width="50" height="15" rx="3" fill="#4CAF50" opacity="0.7"/>
  <rect x="90" y="215" width="50" height="15" rx="3" fill="#4CAF50" opacity="0.4"/>
  <text x="115" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#00AEEF">5.12kWh</text>
  <!-- Inverter -->
  <rect x="440" y="170" width="80" height="80" rx="8" fill="#0A1F3F"/>
  <rect x="452" y="182" width="56" height="20" rx="4" fill="#00AEEF"/>
  <text x="480" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF8C00">3000W</text>
  <!-- Connection lines -->
  <path d="M150 210 Q200 210 210 180" stroke="#4CAF50" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <path d="M390 180 Q420 180 440 195" stroke="#FF8C00" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <!-- Light bulb icons in house -->
  <circle cx="270" cy="210" r="10" fill="#F5A623" opacity="0.5"/>
  <circle cx="300" cy="200" r="12" fill="#F5A623" opacity="0.6"/>
  <circle cx="330" cy="210" r="10" fill="#F5A623" opacity="0.5"/>
  <!-- Lightning bolts -->
  <path d="M297 190 L303 197 L299 197 L303 207 L295 198 L299 198Z" fill="#F5A623"/>
  <!-- Text -->
  <text x="300" y="330" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="18" font-weight="700" fill="#0A1F3F">Hybrid Domestic Solar System</text>
</svg>
