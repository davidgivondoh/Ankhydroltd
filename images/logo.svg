<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Sun rays -->
  <g transform="translate(60, 38)">
    <line x1="0" y1="-24" x2="0" y2="-30" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="17" y1="-17" x2="21" y2="-21" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="0" x2="30" y2="0" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="-17" y1="-17" x2="-21" y2="-21" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="-24" y1="0" x2="-30" y2="0" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="-21" x2="15" y2="-26" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12" y1="-21" x2="-15" y2="-26" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="21" y1="-10" x2="26" y2="-12" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-21" y1="-10" x2="-26" y2="-12" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Sun body (half circle, behind the droplet) -->
    <path d="M-18,0 A18,18 0 0,1 18,0" fill="#F5A623"/>
    <path d="M-14,0 A14,14 0 0,1 14,0" fill="#FFB347"/>
  </g>
  <!-- Water droplet -->
  <path d="M60,35 Q60,35 45,62 A20,20 0 0,0 75,62 Q60,35 60,35 Z" fill="#00AEEF"/>
  <path d="M60,40 Q60,40 49,60 A14,14 0 0,0 71,60 Q60,40 60,40 Z" fill="#0099D6"/>
  <!-- Droplet shine -->
  <ellipse cx="53" cy="58" rx="4" ry="6" fill="rgba(255,255,255,0.3)" transform="rotate(-15,53,58)"/>
  <!-- Green leaf on the right side of droplet -->
  <path d="M72,52 Q82,42 88,44 Q86,54 74,60 Z" fill="#4CAF50"/>
  <path d="M73,55 Q80,48 86,46" fill="none" stroke="#388E3C" stroke-width="1" stroke-linecap="round"/>
  <!-- Small leaf vein -->
  <path d="M76,56 Q80,52 83,49" fill="none" stroke="#388E3C" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Wave inside droplet -->
  <path d="M48,66 Q53,62 60,66 Q67,70 72,66" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Company text -->
  <text x="60" y="95" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="13" fill="#0A1F3F" letter-spacing="1">ANK HYDRO</text>
  <text x="60" y="109" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="9" fill="#475569" letter-spacing="2">LIMITED</text>
</svg>