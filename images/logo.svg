<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo icon -->
  <g transform="translate(10, 10) scale(1.85)">
    <!-- Outer green leaf arc -->
    <path d="M10,38 Q4,28 6,18 Q8,10 16,6" fill="none" stroke="#2E7D32" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M8,36 Q3,26 6,16 Q9,8 18,4" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Leaf shapes -->
    <path d="M14,8 Q10,2 14,0 Q18,2 16,8 Z" fill="#4CAF50"/>
    <path d="M10,14 Q4,10 6,6 Q10,8 12,14 Z" fill="#2E7D32"/>
    <path d="M12,11 Q7,6 10,3 Q14,5 14,11 Z" fill="#66BB6A"/>
    <!-- Sun -->
    <g transform="translate(28, 12)">
      <line x1="0" y1="-8" x2="0" y2="-12" stroke="#F5A623" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="6" y1="-5.5" x2="9" y2="-8.5" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="0" x2="12" y2="0" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
      <line x1="-6" y1="-5.5" x2="-9" y2="-8.5" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="-12" y2="0" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="-7" x2="6" y2="-11" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-4" y1="-7" x2="-6" y2="-11" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M-9,0 A9,9 0 0,1 9,0" fill="#F5A623"/>
      <path d="M-6,0 A6,6 0 0,1 6,0" fill="#FFCA28"/>
    </g>
    <!-- Main circle -->
    <clipPath id="circleClipLogo">
      <circle cx="28" cy="28" r="16"/>
    </clipPath>
    <g clip-path="url(#circleClipLogo)">
      <path d="M28,12 L44,12 L44,44 L28,44 Z" fill="#8D6E3F"/>
      <path d="M28,28 Q32,24 36,28 Q40,32 44,28 L44,44 L28,44 Z" fill="#7B5B33"/>
      <line x1="36" y1="20" x2="36" y2="28" stroke="#6D4C2A" stroke-width="1" stroke-linecap="round"/>
      <line x1="36" y1="22" x2="33" y2="19" stroke="#6D4C2A" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="36" y1="24" x2="39" y2="21" stroke="#6D4C2A" stroke-width="0.8" stroke-linecap="round"/>
      <path d="M12,12 L28,12 L28,44 L12,44 Z" fill="#0099D6"/>
      <path d="M12,30 Q16,26 20,30 Q24,34 28,30 L28,44 L12,44 Z" fill="#007BB8"/>
      <circle cx="20" cy="32" r="4" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
      <circle cx="22" cy="36" r="3" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
      <path d="M14,26 Q18,24 22,26 Q26,28 28,26" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/>
    </g>
    <circle cx="28" cy="28" r="16" fill="none" stroke="#5D4037" stroke-width="1.5"/>
  </g>
  <!-- Company name text -->
  <text x="130" y="55" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="36" fill="#8B6914" letter-spacing="6">ANK HYDRO</text>
  <text x="155" y="90" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="32" fill="#8B6914" letter-spacing="8">LIMITED</text>
</svg>