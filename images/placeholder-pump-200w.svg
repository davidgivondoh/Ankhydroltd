<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F7FE"/>
      <stop offset="100%" style="stop-color:#B3E5FC"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg1)"/>
  <!-- Water drop -->
  <path d="M300 80 C300 80 260 140 260 170 C260 192 278 210 300 210 C322 210 340 192 340 170 C340 140 300 80 300 80Z" fill="#00AEEF" opacity="0.3"/>
  <!-- Pump body -->
  <rect x="270" y="160" width="60" height="100" rx="8" fill="#0A1F3F"/>
  <rect x="280" y="170" width="40" height="20" rx="4" fill="#00AEEF"/>
  <!-- Pipe top -->
  <rect x="293" y="120" width="14" height="50" fill="#0A1F3F"/>
  <!-- Pipe bottom -->
  <rect x="293" y="260" width="14" height="40" fill="#0A1F3F"/>
  <!-- Sun -->
  <circle cx="480" cy="80" r="35" fill="#F5A623" opacity="0.6"/>
  <line x1="480" y1="30" x2="480" y2="45" stroke="#F5A623" stroke-width="3" opacity="0.6"/>
  <line x1="480" y1="115" x2="480" y2="130" stroke="#F5A623" stroke-width="3" opacity="0.6"/>
  <line x1="430" y1="80" x2="445" y2="80" stroke="#F5A623" stroke-width="3" opacity="0.6"/>
  <line x1="515" y1="80" x2="530" y2="80" stroke="#F5A623" stroke-width="3" opacity="0.6"/>
  <!-- Solar panel -->
  <rect x="430" y="140" width="100" height="60" rx="4" fill="#0A1F3F" transform="rotate(-15 480 170)"/>
  <line x1="445" y1="142" x2="445" y2="198" stroke="#00AEEF" stroke-width="1" transform="rotate(-15 480 170)"/>
  <line x1="465" y1="142" x2="465" y2="198" stroke="#00AEEF" stroke-width="1" transform="rotate(-15 480 170)"/>
  <line x1="485" y1="142" x2="485" y2="198" stroke="#00AEEF" stroke-width="1" transform="rotate(-15 480 170)"/>
  <line x1="505" y1="142" x2="505" y2="198" stroke="#00AEEF" stroke-width="1" transform="rotate(-15 480 170)"/>
  <!-- Text -->
  <text x="300" y="330" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="18" font-weight="700" fill="#0A1F3F">200W Solar Pump</text>
</svg>
