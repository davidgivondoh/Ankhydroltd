<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg3)"/>
  <!-- Ground/earth -->
  <rect x="0" y="280" width="600" height="80" fill="#8D6E63" opacity="0.15" rx="0"/>
  <!-- Borehole -->
  <rect x="185" y="140" width="30" height="160" fill="#5D4037" opacity="0.2" rx="4"/>
  <!-- Pump body (large, industrial) -->
  <rect x="240" y="110" width="100" height="150" rx="12" fill="#0A1F3F"/>
  <rect x="255" y="125" width="70" height="32" rx="6" fill="#00AEEF"/>
  <rect x="255" y="168" width="70" height="14" rx="3" fill="#FF8C00"/>
  <!-- Power indicator -->
  <rect x="262" y="195" width="56" height="40" rx="5" fill="#122D54"/>
  <text x="290" y="220" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#4CAF50">750W</text>
  <!-- Pipe going into ground -->
  <rect x="195" y="100" width="12" height="200" fill="#0A1F3F"/>
  <!-- Pipe connector -->
  <rect x="195" y="170" width="50" height="10" fill="#0A1F3F"/>
  <!-- Water flow arrows -->
  <path d="M201 120 L195 130 L207 130Z" fill="#00AEEF" opacity="0.6"/>
  <path d="M201 145 L195 155 L207 155Z" fill="#00AEEF" opacity="0.4"/>
  <!-- Sun -->
  <circle cx="480" cy="70" r="38" fill="#F5A623" opacity="0.5"/>
  <!-- 3 Solar panels -->
  <rect x="390" y="140" width="45" height="75" rx="3" fill="#0A1F3F" transform="rotate(-12 412 177)"/>
  <rect x="440" y="140" width="45" height="75" rx="3" fill="#0A1F3F" transform="rotate(-12 462 177)"/>
  <rect x="490" y="140" width="45" height="75" rx="3" fill="#0A1F3F" transform="rotate(-12 512 177)"/>
  <!-- Panel lines -->
  <g stroke="#00AEEF" stroke-width="0.7" opacity="0.5">
    <line x1="405" y1="142" x2="405" y2="213" transform="rotate(-12 412 177)"/>
    <line x1="420" y1="142" x2="420" y2="213" transform="rotate(-12 412 177)"/>
    <line x1="455" y1="142" x2="455" y2="213" transform="rotate(-12 462 177)"/>
    <line x1="470" y1="142" x2="470" y2="213" transform="rotate(-12 462 177)"/>
    <line x1="505" y1="142" x2="505" y2="213" transform="rotate(-12 512 177)"/>
    <line x1="520" y1="142" x2="520" y2="213" transform="rotate(-12 512 177)"/>
  </g>
  <!-- Cable line -->
  <path d="M340 200 Q380 200 400 185" stroke="#FF8C00" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <!-- Text -->
  <text x="300" y="330" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="18" font-weight="700" fill="#0A1F3F">750W Solar Pump</text>
</svg>
