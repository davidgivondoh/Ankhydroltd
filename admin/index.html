<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | ANK Hydro Limited</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" type="image/svg+xml" href="../images/logo-icon.svg">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="../images/logo.svg" alt="ANK Hydro Logo" class="login-logo-img" />
        <h1>ANK Hydro Admin</h1>
        <p>Sign in to manage your website</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" required placeholder="admin@ankhydro.com" autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="eye-closed" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="error-msg" style="display:none;"></div>
        <button type="submit" class="btn-admin btn-admin-primary login-btn" id="loginBtn">
          <span class="login-btn-text">Sign In</span>
          <span class="login-btn-loading" style="display:none;">
            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-opacity=".25"/><path d="M12 2a10 10 0 019.95 9" stroke-linecap="round"/></svg>
            Signing in...
          </span>
        </button>
      </form>
      <div class="login-divider"><span>or</span></div>
      <button class="btn-admin btn-admin-outline login-reset-btn" id="resetBtn" style="width:100%;">Reset to Default Password</button>
      <p class="login-footer">Default: <strong>admin@ankhydro.com</strong> / <strong>admin123</strong></p>
    </div>
  </div>
  <script src="admin.js"></script>
  <script>
    // Password toggle
    document.getElementById('passwordToggle')?.addEventListener('click', function() {
      const pw = document.getElementById('password');
      const isPassword = pw.type === 'password';
      pw.type = isPassword ? 'text' : 'password';
      this.querySelector('.eye-open').style.display = isPassword ? 'none' : 'block';
      this.querySelector('.eye-closed').style.display = isPassword ? 'block' : 'none';
    });

    // Reset password
    document.getElementById('resetBtn')?.addEventListener('click', function() {
      localStorage.removeItem('ank_admin_password');
      localStorage.removeItem('ank_admin_auth');
      const err = document.getElementById('loginError');
      err.textContent = 'Password reset to default: admin123';
      err.style.display = 'block';
      err.style.background = '#E8F5E9';
      err.style.color = '#4CAF50';
    });
  </script>
</body>
</html>
